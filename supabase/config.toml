# Supabase CLI project configuration
# Docs: https://supabase.com/docs/guides/cli/config

[project]
# Replace with your actual project ref from:
# https://supabase.com/dashboard/project/<your-project>/settings/general
project_id = "your-project-ref-here"

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[functions]
# Edge functions not used in this project

[analytics]
enabled = false
